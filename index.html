<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitivia Blog Publishing Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       RESET & TOKENS
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07111f;
      --surface:   #0f1f35;
      --card:      #152032;
      --card-hover:#1a2a3f;
      --border:    #1e3250;
      --border-2:  #243b55;
      --teal:      #12A594;
      --teal-dk:   #0d8a7a;
      --teal-glow: rgba(18,165,148,.18);
      --white:     #f0f6ff;
      --muted:     #6b8099;
      --danger:    #ef4444;
      --warn:      #f59e0b;
      --success:   #22c55e;
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 8px 32px rgba(0,0,0,.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      padding: 28px 24px 80px;
    }

    /* ══════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════ */
    .wrap { max-width: 1380px; margin: 0 auto; }

    /* ══════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════ */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo { height: 46px; width: auto; }

    .hdr-right { display: flex; gap: 10px; align-items: center; }

    .stats-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-pill span { color: var(--white); font-size: 13px; }

    /* ══════════════════════════════════════════════
       TABS
    ══════════════════════════════════════════════ */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }

    .tab {
      padding: 11px 24px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      margin-bottom: -1px;
      letter-spacing: .01em;
    }

    .tab:hover { color: var(--white); }
    .tab.on { color: var(--teal); border-bottom-color: var(--teal); }

    .panel { display: none; }
    .panel.on { display: block; }

    /* ══════════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .18s;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border-2);
    }
    .btn-ghost:hover { background: var(--surface); color: var(--white); }

    .btn-teal {
      background: var(--teal);
      color: #fff;
    }
    .btn-teal:hover { background: var(--teal-dk); }
    .btn-teal:disabled { background: var(--border-2); color: var(--muted); cursor: not-allowed; }

    .btn-danger-outline {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239,68,68,.3);
    }
    .btn-danger-outline:hover { background: rgba(239,68,68,.08); }

    .btn-sm { padding: 6px 13px; font-size: 12px; }

    /* ══════════════════════════════════════════════
       BLOG GRID
    ══════════════════════════════════════════════ */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 24px;
    }

    /* ══════════════════════════════════════════════
       CARD
    ══════════════════════════════════════════════ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      transition: transform .22s, border-color .22s, opacity .3s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-2);
    }

    /* Thumbnail */
    .thumb {
      height: 210px;
      background: var(--surface);
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(7,17,31,.8) 100%);
    }

    .thumb-badges {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      background: rgba(7,17,31,.82);
      border: 1px solid var(--border-2);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .badge-teal { color: var(--teal); border-color: rgba(18,165,148,.4); }
    .badge-white { color: var(--white); }

    .no-img {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    /* Card body */
    .cbody {
      padding: 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* SEO score bar */
    .seo-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .seo-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0; }

    .seo-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }

    .seo-pill {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid;
    }

    .seo-good  { color: var(--success); border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.08); }
    .seo-warn  { color: var(--warn);    border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.08); }
    .seo-bad   { color: var(--danger);  border-color: rgba(239,68,68,.35);  background: rgba(239,68,68,.08); }

    /* Fields */
    .lbl {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--teal);
      margin-bottom: 5px;
    }

    .inp {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--white);
      transition: border-color .18s;
    }

    .inp:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-glow); }
    .inp::placeholder { color: var(--muted); }

    textarea.inp { resize: vertical; line-height: 1.55; }
    textarea.inp-content { min-height: 140px; }
    textarea.inp-meta    { min-height: 66px; }

    select.inp { cursor: pointer; appearance: none; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Meta counter */
    .meta-wrap { position: relative; }

    .char-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
    }

    .char-num { font-size: 11px; font-weight: 700; }
    .char-num.good { color: var(--success); }
    .char-num.warn { color: var(--warn); }
    .char-num.bad  { color: var(--danger); }

    .char-track {
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      flex: 1;
      margin-left: 10px;
      overflow: hidden;
    }

    .char-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .3s, background .3s;
    }

    /* Serp preview */
    .serp-preview {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: none;
      border: 1px solid var(--border);
    }

    .serp-url   { font-size: 12px; color: #1a7f37; margin-bottom: 2px; }
    .serp-title { font-size: 17px; color: #1a0dab; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
    .serp-desc  { font-size: 13px; color: #4d5156; line-height: 1.5; }

    /* Content preview modal */
    .preview-wrap { display: none; }

    .preview-box {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 20px;
      color: #1b1b1b;
      font-size: 14px;
      line-height: 1.65;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    /* Card actions */
    .cactions {
      display: flex;
      gap: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .cactions .btn-teal { flex: 1; justify-content: center; }

    .loading { opacity: .55; pointer-events: none; }

    /* ══════════════════════════════════════════════
       CONTENT CALENDAR
    ══════════════════════════════════════════════ */
    .cal-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .cal-hdr h2 { font-size: 17px; font-weight: 700; }

    .add-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 24px;
      display: none;
      animation: slideDown .2s ease;
    }

    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .add-form.on { display: block; }

    .add-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

    table.ctbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .ctbl th {
      text-align: left;
      padding: 11px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    .ctbl td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(30,50,80,.6);
      vertical-align: middle;
    }

    .ctbl tr:last-child td { border-bottom: none; }

    .ctbl tr:hover td { background: rgba(18,165,148,.04); }

    .chip {
      display: inline-block;
      padding: 3px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .chip-pending   { background: rgba(245,158,11,.12); color: #f59e0b; }
    .chip-generated { background: rgba(18,165,148,.12); color: var(--teal); }
    .chip-published { background: rgba(34,197,94,.12);  color: var(--success); }

    /* ══════════════════════════════════════════════
       EMPTY / LOADING
    ══════════════════════════════════════════════ */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
      grid-column: 1 / -1;
    }

    .empty svg { opacity: .25; display: block; margin: 0 auto 16px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    #toast {
      visibility: hidden;
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--teal);
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      z-index: 9999;
      box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(18,165,148,.3);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #toast.show {
      visibility: visible;
      animation: toastIn .35s ease, toastOut .35s ease 2.65s forwards;
    }

    @keyframes toastIn  { from { opacity:0; bottom:20px; } to { opacity:1; bottom:32px; } }
    @keyframes toastOut { from { opacity:1; bottom:32px; } to { opacity:0; bottom:20px; } }

    /* ══════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════ */
    @media (max-width: 620px) {
      body { padding: 16px 14px 60px; }
      .blog-grid { grid-template-columns: 1fr; }
      .row2 { grid-template-columns: 1fr; }
      .hdr { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="hdr">
    <img src="cropped-White.png" alt="Digitivia" class="logo">
    <div class="stats-bar" id="stats-bar">
      <div class="stat-pill">Drafts <span id="stat-drafts">—</span></div>
      <div class="stat-pill">Topics <span id="stat-topics">—</span></div>
      <div class="stat-pill">Published today <span id="stat-today">—</span></div>
    </div>
    <div class="hdr-right">
      <button class="btn btn-ghost" onclick="refreshCurrent()">↻ Refresh</button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" data-tab="drafts"   onclick="switchTab('drafts')">📝 Drafts</button>
    <button class="tab"    data-tab="calendar" onclick="switchTab('calendar')">📅 Content Calendar</button>
  </div>

  <!-- ═══ DRAFTS PANEL ═══ -->
  <div id="panel-drafts" class="panel on">
    <div id="blog-grid" class="blog-grid">
      <div class="empty"><div class="spinner"></div>Loading drafts…</div>
    </div>
  </div>

  <!-- ═══ CALENDAR PANEL ═══ -->
  <div id="panel-calendar" class="panel">

    <div class="cal-hdr">
      <h2>📅 Content Calendar</h2>
      <button class="btn btn-teal" onclick="toggleAddForm()">+ Add Topic</button>
    </div>

    <!-- Add form -->
    <div id="add-form" class="add-form">
      <div class="add-grid">
        <div>
          <label class="lbl">Topic Title *</label>
          <input id="nw-topic" class="inp" placeholder="e.g. AI Chatbots for Saudi Banks">
        </div>
        <div>
          <label class="lbl">Focus Keyword *</label>
          <input id="nw-kw" class="inp" placeholder="e.g. AI chatbots Saudi Arabia">
        </div>
        <div>
          <label class="lbl">Country</label>
          <select id="nw-country" class="inp">
            <option>UAE</option><option>Saudi Arabia</option><option>Egypt</option>
            <option>Qatar</option><option>Kuwait</option><option>Bahrain</option>
            <option>Oman</option><option>Jordan</option><option>Lebanon</option><option>Global</option>
          </select>
        </div>
        <div>
          <label class="lbl">Industry</label>
          <input id="nw-industry" class="inp" placeholder="e.g. banking, retail, real estate">
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-teal" onclick="addTopic()">Save Topic</button>
        <button class="btn btn-ghost" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <table class="ctbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Topic</th>
            <th>Focus Keyword</th>
            <th>Country</th>
            <th>Industry</th>
            <th>Status</th>
            <th>Added</th>
          </tr>
        </thead>
        <tbody id="cal-body">
          <tr><td colspan="7" style="text-align:center;padding:50px;color:var(--muted);">
            <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /wrap -->

<!-- TOAST -->
<div id="toast">✓ Done</div>

<!-- SERP PREVIEW MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;align-items:center;justify-content:center;padding:20px;" onclick="closeModal()">
  <div id="modal-box" style="background:var(--card);border:1px solid var(--border-2);border-radius:var(--radius);max-width:860px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;position:relative;" onclick="event.stopPropagation()">
    <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const WH       = 'https://n8n.srv1174105.hstgr.cloud/webhook/blog-dashboard';
const WH_CAL   = 'https://n8n.srv1174105.hstgr.cloud/webhook/blog-calendar';
const SITE_URL = 'https://digitivia.com';

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let _tab = 'drafts';
let _drafts = [];
let _topics = [];

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
function switchTab(name) {
  _tab = name;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('panel-' + name).classList.add('on');
  if (name === 'calendar') fetchCalendar();
}

function refreshCurrent() {
  if (_tab === 'drafts') fetchDrafts();
  else fetchCalendar();
}

/* ════════════════════════════════════════
   STATS BAR
════════════════════════════════════════ */
function updateStats() {
  document.getElementById('stat-drafts').textContent = _drafts.length;
  document.getElementById('stat-topics').textContent = _topics.filter(t => t.status === 'pending').length + ' pending';
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-today').textContent = _topics.filter(t =>
    t.status === 'published' && (t.published_at || '').startsWith(today)
  ).length;
}

/* ════════════════════════════════════════
   FETCH DRAFTS
════════════════════════════════════════ */
async function fetchDrafts() {
  const grid = document.getElementById('blog-grid');
  grid.innerHTML = '<div class="empty"><div class="spinner"></div>Loading drafts…</div>';
  try {
    const res = await fetch(WH, { method: 'GET' });
    let data = await res.json();
    if (!Array.isArray(data)) data = [data];
    _drafts = data.filter(d => d && d.id);
    updateStats();
    renderDrafts();
  } catch (e) {
    console.error(e);
    grid.innerHTML = '<div class="empty" style="color:var(--danger);">⚠ Could not reach n8n. Check that the workflow is active.</div>';
  }
}

function renderDrafts() {
  const grid = document.getElementById('blog-grid');
  grid.innerHTML = '';
  if (_drafts.length === 0) {
    grid.innerHTML = '<div class="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>No drafts pending review. The AI will generate the next one at 2 PM Cairo time.</div>';
    return;
  }
  _drafts.forEach(post => grid.appendChild(buildCard(post)));
}

/* ════════════════════════════════════════
   BUILD CARD
════════════════════════════════════════ */
function buildCard(post) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-' + post.id;

  const hasImg = post.image_url && post.image_url.trim();
  const thumbHtml = hasImg
    ? `<div class="thumb" style="background-image:url('${esc(post.image_url)}')">
         <div class="thumb-overlay"></div>
         <div class="thumb-badges">
           ${post.country   ? `<span class="badge badge-teal">${esc(post.country)}</span>` : ''}
           ${post.category  ? `<span class="badge badge-white">${esc(post.category)}</span>` : ''}
         </div>
       </div>`
    : `<div class="thumb">
         <div class="no-img">
           <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           No featured image
         </div>
       </div>`;

  const metaLen = (post.meta_desc || '').length;
  const metaClass = metaLen >= 140 && metaLen <= 158 ? 'good' : 'warn';

  const seoScore = computeSEOScore(post);

  const countries = ['UAE','Saudi Arabia','Egypt','Qatar','Kuwait','Bahrain','Oman','Jordan','Lebanon','Global'];
  const categories = ['Digital Marketing','AI & Automation','SEO','Social Media','E-Commerce','Business Strategy','Technology'];

  div.innerHTML = `
    ${thumbHtml}
    <div class="cbody">

      <!-- SEO Score Bar -->
      <div class="seo-bar" title="Live SEO quality indicators">
        <span class="seo-label">SEO</span>
        <div class="seo-pills" id="seo-${post.id}">
          ${renderSEOPills(seoScore)}
        </div>
      </div>

      <!-- Title -->
      <div>
        <label class="lbl">Title</label>
        <input class="inp title-inp" value="${esc(post.title || '')}" oninput="refreshSEO('${post.id}')">
      </div>

      <!-- Keyword + Country -->
      <div class="row2">
        <div>
          <label class="lbl">Focus Keyword</label>
          <input class="inp kw-inp" value="${esc(post.focus_keyword || '')}" placeholder="main SEO keyword" oninput="refreshSEO('${post.id}')">
        </div>
        <div>
          <label class="lbl">Country</label>
          <select class="inp country-inp">
            ${countries.map(c => `<option${c === (post.country||'UAE') ? ' selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- Category + Tags -->
      <div class="row2">
        <div>
          <label class="lbl">Category</label>
          <select class="inp cat-inp">
            ${categories.map(c => `<option${c === (post.category||'Digital Marketing') ? ' selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="lbl">Tags</label>
          <input class="inp tags-inp" value="${esc(post.tags || '')}" placeholder="tag1, tag2, tag3">
        </div>
      </div>

      <!-- Meta description -->
      <div>
        <label class="lbl">Meta Description <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;">(ideal: 140–158 chars)</span></label>
        <div class="meta-wrap">
          <textarea class="inp inp-meta meta-inp" oninput="updateCounter(this,'${post.id}'); refreshSEO('${post.id}')">${esc(post.meta_desc || '')}</textarea>
          <div class="char-bar">
            <span class="char-num ${metaClass}" id="cn-${post.id}">${metaLen}</span>
            <div class="char-track"><div class="char-fill" id="cf-${post.id}" style="${metaFill(metaLen)}"></div></div>
          </div>
        </div>
      </div>

      <!-- Google SERP preview toggle -->
      <div>
        <button class="btn btn-ghost btn-sm" onclick="toggleSerp(this,'${post.id}')">🔍 Google Preview</button>
        <div class="serp-preview" id="serp-${post.id}"></div>
      </div>

      <!-- Content -->
      <div>
        <label class="lbl">Content (HTML)</label>
        <textarea class="inp inp-content content-inp">${esc(post.content || '')}</textarea>
      </div>

      <!-- Content preview -->
      <div class="preview-wrap" id="pw-${post.id}">
        <div class="preview-box" id="pb-${post.id}"></div>
      </div>

      <!-- Actions -->
      <div class="cactions">
        <button class="btn btn-ghost btn-sm" onclick="openPreview('${post.id}')">👁 Preview</button>
        <button class="btn btn-teal" onclick="publishPost('${post.id}','${esc(post.image_url||'')}')">
          ✓ Approve &amp; Publish
        </button>
      </div>
    </div>`;

  return div;
}

/* ════════════════════════════════════════
   SEO SCORE
════════════════════════════════════════ */
function computeSEOScore(post) {
  const title   = (post.title   || (post.title_inp   && post.title_inp.value)   || '').toLowerCase();
  const kw      = (post.focus_keyword || '').toLowerCase();
  const meta    = (post.meta_desc || '').toLowerCase();
  const content = (post.content || '').toLowerCase();
  const metaLen = (post.meta_desc || '').length;

  return {
    kwInTitle:   kw && title.includes(kw.split(' ')[0]),
    metaLen:     metaLen >= 140 && metaLen <= 158,
    kwInMeta:    kw && meta.includes(kw.split(' ')[0]),
    hasSchema:   !!(post.schema_json && post.schema_json.length > 5),
    hasImg:      !!(post.image_url && post.image_url.trim()),
    wordCount:   (content.replace(/<[^>]+>/g, ' ').trim().split(/\s+/).filter(Boolean).length >= 900)
  };
}

function refreshSEO(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const post = {
    title: card.querySelector('.title-inp').value,
    focus_keyword: card.querySelector('.kw-inp').value,
    meta_desc: card.querySelector('.meta-inp').value,
    content: card.querySelector('.content-inp').value,
    schema_json: '[]',
    image_url: ''
  };
  const score = computeSEOScore(post);
  document.getElementById('seo-' + id).innerHTML = renderSEOPills(score);
  updateSerpBox(id);
}

function renderSEOPills(s) {
  const pills = [
    [s.kwInTitle,  'KW in title'],
    [s.metaLen,    'Meta length'],
    [s.kwInMeta,   'KW in meta'],
    [s.hasSchema,  'Schema'],
    [s.hasImg,     'Image'],
    [s.wordCount,  '900+ words']
  ];
  return pills.map(([ok, label]) =>
    `<span class="seo-pill ${ok ? 'seo-good' : 'seo-warn'}">${ok ? '✓' : '!'} ${label}</span>`
  ).join('');
}

/* ════════════════════════════════════════
   META COUNTER
════════════════════════════════════════ */
function updateCounter(el, id) {
  const len = el.value.length;
  const cn  = document.getElementById('cn-' + id);
  const cf  = document.getElementById('cf-' + id);
  if (!cn) return;
  cn.textContent = len;
  cn.className = 'char-num ' + (len >= 140 && len <= 158 ? 'good' : len > 0 && len < 140 ? 'warn' : len > 158 ? 'bad' : 'warn');
  cf.style.cssText = metaFill(len);
}

function metaFill(len) {
  const pct = Math.min(100, Math.round((len / 158) * 100));
  const col = len >= 140 && len <= 158 ? '#22c55e' : len > 158 ? '#ef4444' : '#f59e0b';
  return `width:${pct}%;background:${col};`;
}

/* ════════════════════════════════════════
   SERP PREVIEW
════════════════════════════════════════ */
function toggleSerp(btn, id) {
  const box = document.getElementById('serp-' + id);
  const open = box.style.display === 'block';
  box.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '🔍 Google Preview' : '✕ Hide Preview';
  if (!open) updateSerpBox(id);
}

function updateSerpBox(id) {
  const box = document.getElementById('serp-' + id);
  if (!box || box.style.display !== 'block') return;
  const card = document.getElementById('card-' + id);
  const title = esc(card.querySelector('.title-inp').value || 'Blog Title');
  const meta  = esc(card.querySelector('.meta-inp').value  || 'Meta description will appear here.');
  box.innerHTML = `
    <div class="serp-url">${SITE_URL}/blog/ › article-title</div>
    <div class="serp-title">${title} - Digitivia</div>
    <div class="serp-desc">${meta}</div>`;
}

/* ════════════════════════════════════════
   CONTENT PREVIEW
════════════════════════════════════════ */
function openPreview(id) {
  const card    = document.getElementById('card-' + id);
  const content = card.querySelector('.content-inp').value;
  const title   = card.querySelector('.title-inp').value;
  const meta    = card.querySelector('.meta-inp').value;
  const modal   = document.getElementById('modal-content');
  modal.innerHTML = `
    <h2 style="font-size:20px;margin-bottom:10px;">${esc(title)}</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:20px;">${esc(meta)}</p>
    <div style="background:#fff;border-radius:10px;padding:24px;color:#1b1b1b;font-size:15px;line-height:1.7;">${content}</div>`;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

/* ════════════════════════════════════════
   PUBLISH
════════════════════════════════════════ */
async function publishPost(id, imgUrl) {
  const card = document.getElementById('card-' + id);
  const btn  = card.querySelector('.btn-teal');

  const title   = card.querySelector('.title-inp').value.trim();
  const content = card.querySelector('.content-inp').value.trim();
  const meta    = card.querySelector('.meta-inp').value.trim();
  const kw      = card.querySelector('.kw-inp').value.trim();
  const cat     = card.querySelector('.cat-inp').value;
  const tags    = card.querySelector('.tags-inp').value.trim();
  const country = card.querySelector('.country-inp').value;

  if (!title)   { alert('Title is required.'); return; }
  if (!content) { alert('Content is required.'); return; }

  card.classList.add('loading');
  btn.textContent = 'Publishing…';
  btn.disabled = true;

  const draft = _drafts.find(d => String(d.id) === String(id)) || {};

  const payload = {
    id,
    new_title:     title,
    new_content:   content,
    excerpt:       meta,
    image_url:     imgUrl,
    focus_keyword: kw,
    category:      cat,
    tags,
    country,
    schema_json:   draft.schema_json || '',
    alt_text:      draft.alt_text    || ''
  };

  try {
    const res = await fetch(WH, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    if (res.ok) {
      card.style.transform = 'scale(.93)';
      card.style.opacity   = '0';
      setTimeout(() => {
        card.remove();
        _drafts = _drafts.filter(d => String(d.id) !== String(id));
        updateStats();
        if (_drafts.length === 0) renderDrafts();
      }, 320);
      toast('🚀 Published to WordPress!');
    } else {
      const err = await res.text();
      alert('Publish failed: ' + err);
      card.classList.remove('loading');
      btn.textContent = '✓ Approve & Publish';
      btn.disabled = false;
    }
  } catch (e) {
    console.error(e);
    alert('Network error — check console.');
    card.classList.remove('loading');
    btn.textContent = '✓ Approve & Publish';
    btn.disabled = false;
  }
}

/* ════════════════════════════════════════
   CONTENT CALENDAR
════════════════════════════════════════ */
async function fetchCalendar() {
  const tbody = document.getElementById('cal-body');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:50px;"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto;"></div></td></tr>';
  try {
    const res = await fetch(WH_CAL, { method: 'GET' });
    let data = await res.json();
    if (!Array.isArray(data)) data = [data];
    _topics = data.filter(t => t && (t.topic || t.id));
    updateStats();
    renderCalendar();
  } catch (e) {
    console.error(e);
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--danger);">⚠ Could not load calendar. Check n8n workflow is active.</td></tr>';
  }
}

function renderCalendar() {
  const tbody = document.getElementById('cal-body');
  if (_topics.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--muted);">No topics yet. Click "+ Add Topic" to get started.</td></tr>';
    return;
  }
  tbody.innerHTML = _topics.map((row, i) => `
    <tr>
      <td style="color:var(--muted);font-size:12px;">${i + 1}</td>
      <td style="font-weight:600;max-width:260px;">${esc(row.topic || '—')}</td>
      <td style="color:var(--teal);font-size:12px;">${esc(row.focus_keyword || '—')}</td>
      <td>${esc(row.country || '—')}</td>
      <td style="color:var(--muted);">${esc(row.industry || '—')}</td>
      <td><span class="chip chip-${row.status || 'pending'}">${row.status || 'pending'}</span></td>
      <td style="color:var(--muted);font-size:12px;">${row.createdAt ? new Date(row.createdAt).toLocaleDateString('en-GB') : '—'}</td>
    </tr>`).join('');
}

function toggleAddForm() {
  document.getElementById('add-form').classList.toggle('on');
}

async function addTopic() {
  const topic    = document.getElementById('nw-topic').value.trim();
  const kw       = document.getElementById('nw-kw').value.trim();
  const country  = document.getElementById('nw-country').value;
  const industry = document.getElementById('nw-industry').value.trim();
  if (!topic || !kw) { alert('Topic and Focus Keyword are required.'); return; }

  const btn = document.querySelector('#add-form .btn-teal');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    const res = await fetch(WH_CAL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ topic, focus_keyword: kw, country, industry, status: 'pending' })
    });
    if (!res.ok) throw new Error(res.status);
    ['nw-topic','nw-kw','nw-industry'].forEach(id => document.getElementById(id).value = '');
    toggleAddForm();
    toast('✓ Topic added to calendar!');
    fetchCalendar();
  } catch (e) {
    console.error(e);
    alert('Failed to add topic: ' + e.message);
  } finally {
    btn.textContent = 'Save Topic';
    btn.disabled = false;
  }
}

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show';
  setTimeout(() => { t.className = ''; }, 3000);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
fetchDrafts();
</script>
